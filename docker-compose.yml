services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: bizppurio-api
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      # 개발 편의: 코드는 호스트에서 직접 수정 → --reload로 즉시 반영
      - ./backend:/app/backend
      # 생성된 합성 데이터 호스트에서도 접근 가능하게
      - ./data:/app/data
      # 노트북도 호스트에서 직접 열람·실행 가능하게
      - ./notebooks:/app/notebooks
    environment:
      - PYTHONPATH=/app/backend
    # Dockerfile의 CMD를 명시적으로 재기술 (compose에서 가시성 ↑)
    command: >
      uvicorn src.api.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --app-dir backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bizppurio-frontend
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      # 호스트의 비어있는 node_modules가 컨테이너 내부를 덮어쓰지 않도록 익명 볼륨으로 보존
      - /app/node_modules
    depends_on:
      - api
